<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقي للترندات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .page { height: 100vh; width: 100%; }
    </style>
</head>
<body class="bg-black text-white">

    <!-- الصفحة الأولى (اختيار الدولة) -->
    <header class="page bg-cover bg-center bg-no-repeat bg-gray-900" style="background-image: url('top.png');">
        <div class="flex h-full flex-col items-center justify-center text-center px-4">
            <h1 class="text-4xl font-bold mb-8">اختر دولتك للمتابعة</h1>
            <select id="countrySelect" class="bg-black/50 border-2 border-white px-10 py-4 rounded-[4px] text-white font-bold cursor-pointer outline-none">
                <option value="" disabled selected>اختر الدولة</option>
                <option value="SA">السعودية</option>
                <option value="AE">الإمارات</option>
                <option value="KW">الكويت</option>
                <option value="QA">قطر</option>
                <option value="BH">البحرين</option>
                <option value="OM">عمان</option>
            </select>
        </div>
    </header>

    <!-- حاوية الترندات -->
    <div id="trendsContainer" class="bg-white">
        <section id="trend1" class="min-h-screen flex items-center justify-center p-6 border-b border-gray-200">
            <div class="max-w-md w-full text-center text-black">
                <h2 class="title text-3xl font-bold mb-4">جاري تحميل الترند الأول...</h2>
                <div class="img h-40 bg-gray-300 rounded-lg mb-6"></div>
                <a href="#" class="link border border-black py-2 px-6 rounded-[4px] inline-block">التفاصيل</a>
            </div>
        </section>
        <section id="trend2" class="min-h-screen flex items-center justify-center p-6 border-b border-gray-200">
            <div class="max-w-md w-full text-center text-black">
                <h2 class="title text-3xl font-bold mb-4">جاري تحميل الترند الثاني...</h2>
                <div class="img h-40 bg-gray-300 rounded-lg mb-6"></div>
                <a href="#" class="link border border-black py-2 px-6 rounded-[4px] inline-block">التفاصيل</a>
            </div>
        </section>
        <section id="trend3" class="min-h-screen flex items-center justify-center p-6 border-b border-gray-200">
            <div class="max-w-md w-full text-center text-black">
                <h2 class="title text-3xl font-bold mb-4">جاري تحميل الترند الثالث...</h2>
                <div class="img h-40 bg-gray-300 rounded-lg mb-6"></div>
                <a href="#" class="link border border-black py-2 px-6 rounded-[4px] inline-block">التفاصيل</a>
            </div>
        </section>
        <section id="trend4" class="min-h-screen flex items-center justify-center p-6 border-b border-gray-200">
            <div class="max-w-md w-full text-center text-black">
                <h2 class="title text-3xl font-bold mb-4">جاري تحميل الترند الرابع...</h2>
                <div class="img h-40 bg-gray-300 rounded-lg mb-6"></div>
                <a href="#" class="link border border-black py-2 px-6 rounded-[4px] inline-block">التفاصيل</a>
            </div>
        </section>
        <section id="trend5" class="min-h-screen flex items-center justify-center p-6 border-b border-gray-200">
            <div class="max-w-md w-full text-center text-black">
                <h2 class="title text-3xl font-bold mb-4">جاري تحميل الترند الخامس...</h2>
                <div class="img h-40 bg-gray-300 rounded-lg mb-6"></div>
                <a href="#" class="link border border-black py-2 px-6 rounded-[4px] inline-block">التفاصيل</a>
            </div>
        </section>
    </div>

    <!-- ربط ملف الجافاسكريبت الخارجي -->
    <script src="script.js"></script>
</body>
</html>
